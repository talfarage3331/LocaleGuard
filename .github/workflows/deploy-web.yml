name: Deploy web (Cloudflare Workers)

# Deploys apps/web to Cloudflare Workers via OpenNext. Runs on Linux, where the
# Next.js standalone step can create the symlinks Windows blocks locally.
# Replaces the Cloudflare Pages/next-on-pages build, which can't run this app
# (it forces edge runtime; the app uses node:crypto + postgres + Hyperdrive).
#
# Requires these repo secrets:
#   CLOUDFLARE_API_TOKEN  — token with "Edit Cloudflare Workers" permission
#   CLOUDFLARE_ACCOUNT_ID — 0bc8a25e796ce9a0b3f639d154d4989b
#   DATABASE_URL          — direct Supabase connection (port 5432, NOT the txn
#                           pooler) used only to apply Drizzle migrations here.
# Other runtime secrets (AUTH_SECRET, GITHUB_OAUTH_*, STRIPE_*) are set on the
# Worker separately (dashboard or `wrangler secret put`), not here. The Worker
# itself reaches Postgres via the Hyperdrive binding, not DATABASE_URL.
on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/core/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Apply pending Drizzle migrations BEFORE deploying, so the schema the new
      # code expects exists before that code serves traffic. Migrations are
      # additive, so old code tolerates the new columns during the brief overlap.
      - name: Apply database migrations
        run: pnpm --filter @localeguard/web db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build and deploy (OpenNext → Workers)
        run: pnpm cf:deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # wrangler resolves the Hyperdrive binding even on `deploy` and demands a
          # local connection string. It's only for local emulation — the deployed
          # worker uses the real Hyperdrive `id` — so a throwaway value unblocks it.
          CLOUDFLARE_HYPERDRIVE_LOCAL_CONNECTION_STRING_HYPERDRIVE: postgresql://user:pass@localhost:5432/localeguard
